
<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeX - Competitive Programming Olympiad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --bg-base: #ffffff;
            --bg-soft: #f7f7f8;
            --text-primary: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --gold: #edaf00;
            --gold-deep: #866300;
            --accent-blue: #2f55be;
            --glass-bg: rgba(255, 255, 255, 0.88);
            --glass-border: rgba(17, 24, 39, 0.08);
        }
        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(800px circle at 20% 10%, rgba(237,175,0,.18), transparent 60%),
                radial-gradient(900px circle at 85% 15%, rgba(47,85,190,.14), transparent 55%),
                linear-gradient(180deg, var(--bg-base) 0%, var(--bg-soft) 100%);
            color: var(--text-primary);
            margin: 0;
            overflow-x: hidden;
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .text-gradient {
            background: linear-gradient(135deg, #f5d372, #edaf00, #b98000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-shell {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            min-height: 520px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
        .hero-slides {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        .hero-slide {
            position: absolute;
            inset: -5%;
            background-size: cover;
            background-position: center;
            filter: saturate(1.05) contrast(1.05) brightness(0.8);
            animation: heroFade 18s infinite;
            opacity: 0;
            transform: scale(1.02);
        }
        .hero-slide:nth-child(1) { animation-delay: 0s; }
        .hero-slide:nth-child(2) { animation-delay: 6s; }
        .hero-slide:nth-child(3) { animation-delay: 12s; }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(80% 90% at 10% 50%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 45%, rgba(255,255,255,0.25) 70%, transparent 100%),
                linear-gradient(180deg, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.9) 100%);
        }
        .hero-content {
            position: relative;
            z-index: 1;
            padding: 72px 72px 64px;
            max-width: 760px;
        }
        .hero-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(237, 175, 0, 0.14);
            border: 1px solid rgba(237, 175, 0, 0.45);
            color: var(--gold-deep);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 999px;
        }
        .hero-title {
            margin: 18px 0 12px;
            font-size: clamp(38px, 5vw, 72px);
            line-height: 1.05;
            font-weight: 800;
        }
        .hero-accent { color: var(--gold); }
        .hero-sub {
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1.7;
            max-width: 620px;
        }
        .hero-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .hero-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 22px;
            border-radius: 999px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hero-btn-primary {
            background:
                radial-gradient(900px circle at 15% 10%, rgba(37,99,235,0.14), transparent 60%),
                radial-gradient(1000px circle at 85% 15%, rgba(14,165,164,0.12), transparent 60%),
                linear-gradient(180deg, var(--bg-base) 0%, var(--bg-soft) 100%);
            color: #1f2937;
            box-shadow: 0 10px 30px rgba(237,175,0,0.32);
        }
        .hero-btn-ghost {
            border: 1px solid var(--border);
            color: var(--text-primary);
            background: rgba(255,255,255,0.7);
        }
        .hero-btn:hover { transform: translateY(-1px); }
        .hero-stats {
            margin-top: 32px;
            display: flex;
            gap: 32px;
            color: #6b7280;
        }
        .hero-stats strong {
            font-size: 28px;
            color: #1f2937;
        }
        .hero-stats span {
            display: block;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6b7280;
            margin-top: 4px;
        }
        .hero-dots {
            margin-top: 22px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .hero-dots .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: rgba(17,24,39,0.2);
        }
        .hero-dots .dot.active {
            width: 26px;
            background: linear-gradient(135deg, #3b82f6, #2563eb, #0ea5a4);
        }
        .section {
            padding: 64px 0;
        }
        .container {
            width: min(1120px, 100% - 3rem);
            margin: 0 auto;
        }
        .timeline-strip {
            position: relative;
            padding-top: 28px;
            margin-top: 20px;
            max-width: 980px;
            margin-left: auto;
            margin-right: auto;
        }
        .timeline-line {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, rgba(237,175,0,0.2), rgba(237,175,0,0.9), rgba(237,175,0,0.2));
        }
        .timeline-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 18px;
        }
        .timeline-card {
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px 14px 12px;
            box-shadow: 0 14px 36px rgba(17,24,39,0.08);
        }
        .timeline-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .timeline-date {
            color: var(--gold-deep);
        }
        .timeline-step {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: rgba(237,175,0,0.16);
            color: var(--gold-deep);
            font-weight: 700;
        }
        .timeline-card h3 {
            margin: 0 0 6px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .timeline-card p {
            margin: 0 0 14px;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.6;
        }
        .timeline-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--gold-deep);
        }
        .timeline-tag::before {
            content: '';
            width: 34px;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f5d372, #edaf00, #b98000);
        }
        .info-pill {
            min-width: 160px;
            padding: 12px 16px;
            border-radius: 16px;
            background: var(--bg-soft);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: var(--text-primary);
            font-weight: 600;
        }
        .info-pill span {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .info-pill strong {
            font-size: 16px;
        }
        .registration-form {
            background: var(--glass-bg);
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .field input,
        .field select {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: border 0.2s ease, box-shadow 0.2s ease;
        }
        .field input:focus,
        .field select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(237,175,0,0.16);
        }
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .pill {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .pill.active {
            border-color: rgba(237,175,0,0.5);
            background: linear-gradient(135deg, #f5d372, #edaf00, #b98000);
            color: #1f2937;
            box-shadow: 0 8px 16px rgba(237,175,0,0.2);
        }
        .checkbox {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .checkbox input {
            margin-top: 4px;
        }
        .alert {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(237,175,0,0.45);
            background: rgba(237,175,0,0.1);
            color: var(--gold-deep);
            font-weight: 600;
        }
        .note-card ul {
            margin: 12px 0 0 18px;
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .container {
                width: min(100%, 100% - 2rem);
            }
        }
        @media (max-width: 768px) {
            .hero-content { padding: 56px 24px; }
            .hero-stats { flex-direction: column; gap: 16px; }
        }
        @keyframes heroFade {
            0% { opacity: 0; transform: scale(1.02); }
            8% { opacity: 1; transform: scale(1); }
            33% { opacity: 1; }
            41% { opacity: 0; }
            100% { opacity: 0; }
        }
        @keyframes heroGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f6;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>

</script>

</html>
