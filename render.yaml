services:
  - type: web
    name: codex-olympiad
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run migrate && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@codex.mn
      - key: ADMIN_PASSWORD
        sync: false
      - key: QPAY_CLIENT_ID
        sync: false
      - key: QPAY_CLIENT_SECRET
        sync: false
      - key: QPAY_INVOICE_CODE
        sync: false
      - key: QPAY_BASE_URL
        value: https://merchant.qpay.mn/v2
      - key: QPAY_CALLBACK_URL
        sync: false
